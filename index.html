<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রাষ্ট্রবিজ্ঞান পরীক্ষা</title>
    <!-- PDF ডাউনলোডের জন্য প্রয়োজনীয় লাইব্রেরি -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.6.0/confetti.browser.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #74ebd5, #ACB6E5); margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); border: 2px solid #3498db; }
        .q-block { margin-bottom: 25px; padding: 15px; border-left: 6px solid #3498db; background: linear-gradient(135deg, #f9f9f9, #eef6fb); border-radius: 10px; }
        .q-block label { display: block; margin-top: 8px; cursor: pointer; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; transition: 0.2s; font-size: 15px; }
        .q-block label:hover { background: #e8f4f8; border-color: #3498db; }
        .timer { position: sticky; top: 0; display: flex; align-items: center; justify-content: center; gap: 10px; background: linear-gradient(135deg, #ff5e62, #e74c3c); color: white; padding: 14px 18px; text-align: center; font-weight: bold; border-radius: 14px; z-index: 100; margin-bottom: 20px; font-size: 19px; letter-spacing: 0.5px; box-shadow: 0 6px 14px rgba(231,76,60,0.4); border: 2px solid #ffb3b0; }
        .timer .clock-icon { font-size: 24px; animation: tick 1s infinite steps(2); }
        @keyframes tick { 0% { transform: rotate(0deg);} 50% { transform: rotate(8deg);} 100% { transform: rotate(0deg);} }
        .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: 0.3s; box-shadow: 0 4px 10px rgba(39,174,96,0.3); }
        .btn:hover { filter: brightness(1.05); transform: translateY(-1px); }
        .btn-pdf { background: linear-gradient(135deg, #8e44ad, #9b59b6); box-shadow: 0 4px 10px rgba(142,68,173,0.3); margin-top: 20px; }
        .btn-pdf:hover { filter: brightness(1.05); }
        .result-card { text-align: center; padding: 30px; border: 3px solid #3498db; border-radius: 20px; background: linear-gradient(180deg, #ffffff, #f4faff); position: relative; overflow: hidden; }
        .wrong-ans-box { text-align: left; background: #ffe6e6; padding: 15px; margin-top: 15px; border-left: 5px solid #e74c3c; border-radius: 8px; font-size: 14px; page-break-inside: avoid; }
        .correct-ans-box { text-align: left; background: #e8f8f5; padding: 15px; margin-top: 15px; border-left: 5px solid #27ae60; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container" id="examArea">
    <!-- স্টার্ট সেকশন -->
    <div id="startSection">
        <h2 style="color:#2c3e50; text-align: center;">রাষ্ট্রবিজ্ঞান পরীক্ষা</h2>
        <div style="background:#fdf2f2; padding:15px; border-radius:10px; border:1px solid #e74c3c; color:#c0392b; font-size:14px; margin-bottom:15px;">
            <b>সতর্কবার্তা:</b> পরীক্ষা জমা দেওয়ার পর ৪০ মিনিটের আগে আবার দেওয়া যাবে না। পরীক্ষা চলাকালীন ট্যাব পরিবর্তন বা অন্য অ্যাপে গেলে পরীক্ষা বাতিল হবে এবং ৩০ মিনিটের জন্য আপনি লক হয়ে যাবেন। সততার সাথে পরীক্ষা দিন।
        </div>
        <input type="text" id="sName" placeholder="আপনার নাম লিখুন" style="width:100%; padding:12px; margin:5px 0; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; font-size:16px;">
        <input type="text" id="sClass" placeholder="আপনার শ্রেণি লিখুন" style="width:100%; padding:12px; margin:5px 0; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; font-size:16px;">
        <button class="btn" onclick="startExam()">পরীক্ষা শুরু করুন</button>
    </div>

    <!-- কুইজ সেকশন -->
    <div id="quizSection" style="display:none;">
        <div class="timer" id="timer"><span class="clock-icon">⏰</span> <span id="timerText">সময়: ৪০:০০</span></div>
        <div id="questionsContainer"></div>
        <button class="btn" style="background:#2980b9;" onclick="submitExam()">পরীক্ষা জমা দিন</button>
    </div>

    <!-- রেজাল্ট সেকশন -->
    <div id="resultSection" style="display:none;">
        <div id="pdfContent" class="result-card">
            <h1 id="emoji" style="font-size:50px; margin:0;"></h1>
            <h2 id="msgHead" style="color: #2c3e50;">ফলাফল পত্র</h2>
            <div style="background: #ecf0f1; padding: 10px; border-radius: 10px; display: inline-block; margin-bottom: 15px;">
                <p style="font-size: 18px; margin: 0;"><b>নাম:</b> <span id="resName"></span> | <b>শ্রেণি:</b> <span id="resClass"></span></p>
            </div>
            <h3 style="color:#2980b9; font-size: 24px; margin: 10px 0;">স্কোর: <span id="resScore"></span> / <span id="resTotalScore"></span></h3>
            <h2 id="resPercent" style="margin: 5px 0; color: #e67e22;"></h2>
            <p id="feedback" style="font-weight:bold; font-size: 18px;"></p>
            
            <hr style="border: 1px solid #bdc3c7; margin: 25px 0;">
            
            <div id="wrongAnswersContainer"></div>
        </div>
        <!-- ডাউনলোড বাটন (PDF এর বাইরে থাকবে) -->
        <button class="btn btn-pdf" onclick="downloadResultAsPDF()">📥 রেজাল্ট ও উত্তরপত্র ডাউনলোড করুন (PDF)</button>
    </div>
</div>

<script>
    const LOCK_KEY = "examLockUntil_PoliticalScience";       // ট্যাব পরিবর্তন/চিটিং করলে
    const TAKEN_KEY = "examTakenUntil_PoliticalScience";      // স্বাভাবিকভাবে পরীক্ষা জমা দিলে
    const LOCK_DURATION_MS = 30 * 60 * 1000;   // চিটিং করলে ৩০ মিনিট লক
    const TAKEN_DURATION_MS = 40 * 60 * 1000;  // স্বাভাবিক জমা দিলে ৪০ মিনিট (পরীক্ষার সময়ের সমান) লক, তারপর আবার দেওয়া যাবে

    function showBlockedScreen(message) {
        document.body.innerHTML = "<div style='display:flex; justify-content:center; align-items:center; height:100vh; background:#fdf2f2;'><h2 style='text-align:center; color:#c0392b; font-family:sans-serif; padding: 20px; border: 2px solid #e74c3c; border-radius: 15px; background: #fff;'>" + message + "</h2></div>";
    }

    function formatRemaining(ms) {
        const totalSec = Math.ceil(ms / 1000);
        const min = Math.floor(totalSec / 60);
        const sec = totalSec % 60;
        return min + " মিনিট " + (sec < 10 ? "0" : "") + sec + " সেকেন্ড";
    }

    window.onload = function() {
        // ১. স্বাভাবিকভাবে পরীক্ষা জমা দেওয়ার পর নির্দিষ্ট সময় (৪০ মিনিট) পার না হলে আবার ঢোকা যাবে না
        const takenUntil = parseInt(localStorage.getItem(TAKEN_KEY) || "0", 10);
        if (takenUntil && Date.now() < takenUntil) {
            const remaining = takenUntil - Date.now();
            showBlockedScreen("আপনি ইতিমধ্যে এই পরীক্ষাটি দিয়ে দিয়েছেন।<br>আপনি আর <b>" + formatRemaining(remaining) + "</b> পর পুনরায় পরীক্ষা দিতে পারবেন।");
            setTimeout(() => { window.location.reload(); }, remaining + 500);
            return;
        } else if (takenUntil) {
            localStorage.removeItem(TAKEN_KEY);
        }

        // ২. ট্যাব পরিবর্তনের কারণে লক থাকলে - ৩০ মিনিট পর আবার ঢোকা যাবে
        const lockUntil = parseInt(localStorage.getItem(LOCK_KEY) || "0", 10);
        if (lockUntil && Date.now() < lockUntil) {
            const remaining = lockUntil - Date.now();
            showBlockedScreen("আপনি পরীক্ষা চলাকালীন ট্যাব পরিবর্তন করার কারণে পরীক্ষা বাতিল হয়েছে।<br>আপনি আর <b>" + formatRemaining(remaining) + "</b> পর পুনরায় পরীক্ষা দিতে পারবেন।");
            setTimeout(() => { window.location.reload(); }, remaining + 500);
            return;
        } else if (lockUntil) {
            localStorage.removeItem(LOCK_KEY);
        }
    };

    // আপনার দেওয়া ৪৪টি প্রশ্ন সম্পূর্ণ নির্ভুলভাবে দেওয়া হলো
    const questions = [
        {"q": "সম্মিলিত জাতিপুঞ্জ কত সালে প্রতিষ্ঠিত হয়?", "a": "১৯৪৫ খ্রিঃ", "options": ["১৯৪৫ খ্রিঃ", "১৯৩৯ খ্রিঃ", "১৯১৪ খ্রিঃ", "১৯৫০ খ্রিঃ"]},
        {"q": "নিরাপত্তা পরিষদের স্থায়ী সদস্যসংখ্যা কত?", "a": "৫ টি", "options": ["৫ টি", "১০ টি", "১৫ টি", "২০ টি"]},
        {"q": "'A History of the league of Nation' - বইটির রচয়িতা কে?", "a": "Francis Paul Walters", "options": ["Francis Paul Walters", "Woodrow Wilson", "Winston Churchill", "Kofi Annan"]},
        {"q": "দ্বিতীয় বিশ্বযুদ্ধ কবে শুরু হয়?", "a": "১৯৩৯ খ্রিঃ", "options": ["১৯৩৯ খ্রিঃ", "১৯১৪ খ্রিঃ", "১৯৪৫ খ্রিঃ", "১৯৫০ খ্রিঃ"]},
        {"q": "আটলান্টিক সনদ কবে ঘোষিত হয়?", "a": "১৯৪১ খ্রিঃ", "options": ["১৯৪১ খ্রিঃ", "১৯৪২ খ্রিঃ", "১৯৪৫ খ্রিঃ", "১৯৩৯ খ্রিঃ"]},
        {"q": "ওয়াশিংটন ঘোষণা কবে হয়?", "a": "১৯৪২ খ্রিঃ", "options": ["১৯৪২ খ্রিঃ", "১৯৪১ খ্রিঃ", "১৯৪৫ খ্রিঃ", "১৯৫০ খ্রিঃ"]},
        {"q": "ইয়ালটা সম্মেলন কবে হয়?", "a": "১৯৪৫ খ্রিঃ", "options": ["১৯৪৫ খ্রিঃ", "১৯৪৩ খ্রিঃ", "১৯৪৪ খ্রিঃ", "১৯৪৬ খ্রিঃ"]},
        {"q": "বর্তমানে জাতিপুঞ্জের সদস্যসংখ্যা কত?", "a": "১৯৩ টি", "options": ["১৯৩ টি", "১৯১ টি", "১৯২ টি", "১৯৫ টি"]},
        {"q": "নিরাপত্তা পরিষদের সদস্যসংখ্যা কত?", "a": "১৫ টি", "options": ["১৫ টি", "৫ টি", "১০ টি", "২০ টি"]},
        {"q": "অছি পরিষদের বর্তমান সদস্যসংখ্যা কত?", "a": "৫ টি", "options": ["৫ টি", "১১ জন", "১৫ জন", "২০ জন"]},
        {"q": "আন্তর্জাতিক বিচারালয়ে বিচারপতির সংখ্যা কত?", "a": "১৫ জন", "options": ["১৫ জন", "৯ জন", "১০ জন", "২০ জন"]},
        {"q": "নিরাপত্তা পরিষদের অস্থায়ী সদস্যদের কার্যকালের মেয়াদ কত?", "a": "২ বছর", "options": ["২ বছর", "১ বছর", "৩ বছর", "৫ বছর"]},
        {"q": "আন্তর্জাতিক বিচারালয়ে বিচারপতিদের কার্যকালের মেয়াদ কত?", "a": "৯ বছর", "options": ["৯ বছর", "৫ বছর", "৭ বছর", "১০ বছর"]},
        {"q": "জাতিপুঞ্জের সনদে প্রস্তাবনার সংখ্যা কত?", "a": "১টি", "options": ["১টি", "২টি", "৩টি", "৫টি"]},
        {"q": "জাতিপুঞ্জের সনদে অধ্যায় সংখ্যা কত?", "a": "১৯টি", "options": ["১৯টি", "১১টি", "১৫টি", "২১টি"]},
        {"q": "জাতিপুঞ্জের সনদে ধারা সংখ্যা কত?", "a": "১১১টি", "options": ["১১১টি", "১০০টি", "১২১টি", "১৫০টি"]},
        {"q": "সুইজারল্যান্ড জাতিপুঞ্জের সদস্যপদ কবে গ্রহণ করে?", "a": "২০০২ সালে", "options": ["২০০২ সালে", "১৯৪৫ সালে", "১৯৯৫ সালে", "২০১০ সালে"]},
        {"q": "সানফ্রানসিসকো সম্মেলন কবে হয়?", "a": "১৯৪৫ খ্রিঃ", "options": ["১৯৪৫ খ্রিঃ", "১৯৪২ খ্রিঃ", "১৯৪৪ খ্রিঃ", "১৯৪৬ খ্রিঃ"]},
        {"q": "সাধারণসভায় অধিবেশন বছরে কতবার বসে?", "a": "১ বার", "options": ["১ বার", "২ বার", "৩ বার", "৪ বার"]},
        {"q": "জাতিপুঞ্জের প্রধান সংস্থার সংখ্যা কয়টি?", "a": "৬টি", "options": ["৬টি", "৪টি", "৫টি", "৭টি"]},
        {"q": "নিরাপত্তা পরিষদের সভাপতির কার্যকালের মেয়াদ কত?", "a": "১ মাস", "options": ["১ মাস", "৬ মাস", "১ বছর", "২ বছর"]},
        {"q": "জাতিপুঞ্জের প্রথম মহাসচিব কে ছিলেন?", "a": "ট্রিগভিলি", "options": ["ট্রিগভিলি", "হ্যামারশিল্ড", "উ-থান্ট", "কুয়েলার"]},
        {"q": "সুয়েজ সমস্যা সমাধানে উদ্যোগ কে গ্রহণ করেছিল?", "a": "হ্যামারশিল্ড", "options": ["হ্যামারশিল্ড", "ট্রিগভিলি", "উ-থান্ট", "কুয়েলার"]},
        {"q": "কঙ্গো সমস্যা সমাধানে কে উদ্যোগ গ্রহণ করেছিল?", "a": "উ-থান্ট", "options": ["উ-থান্ট", "ট্রিগভিলি", "হ্যামারশিল্ড", "কুয়েলার"]},
        {"q": "ইরাক-ইরান যুদ্ধ বন্ধ করার উদ্যোগ কে নিয়েছিলেন?", "a": "কুয়েলার", "options": ["কুয়েলার", "ট্রিগভিলি", "হ্যামারশিল্ড", "উ-থান্ট"]},
        {"q": "WHO এর সদর দপ্তর কোথায় অবস্থিত?", "a": "জেনেভা", "options": ["জেনেভা", "নিউ ইয়র্ক", "প্যারিস", "ওয়াশিংটন"]},
        {"q": "UNICEF এর সদর দপ্তর কোথায় অবস্থিত?", "a": "নিউ ইয়র্ক", "options": ["নিউ ইয়র্ক", "জেনেভা", "প্যারিস", "রোম"]},
        {"q": "World Bank এর সদর দপ্তর কোথায় অবস্থিত?", "a": "ওয়াশিংটন", "options": ["ওয়াশিংটন", "নিউ ইয়র্ক", "লন্ডন", "জেনেভা"]},
        {"q": "UNESCO এর সদর দপ্তর কোথায় অবস্থিত?", "a": "প্যারিস", "options": ["প্যারিস", "লন্ডন", "জেনেভা", "নিউ ইয়র্ক"]},
        {"q": "বিশ্ব স্বাস্থ্য দিবস কবে পালিত হয়?", "a": "৭ এপ্রিল", "options": ["৭ এপ্রিল", "১০ ডিসেম্বর", "৫ জুন", "১ মে"]},

    function startExam() {
        const name = document.getElementById('sName').value.trim();
        const sClass = document.getElementById('sClass').value.trim();
        if(!name || !sClass) return alert("দয়া করে আপনার নাম ও শ্রেণি সঠিকভাবে লিখুন!");
        
        document.getElementById('startSection').style.display = 'none';
        document.getElementById('quizSection').style.display = 'block';
        
        // প্রশ্নগুলো রেন্ডম করা
        questions.sort(() => Math.random() - 0.5);
        const container = document.getElementById('questionsContainer');
        
        questions.forEach((q, i) => {
            q.options.sort(() => Math.random() - 0.5);
            let html = `<div class="q-block"><p style="font-size:16px;"><b>${i+1}. ${q.q}</b></p>`;
            q.options.forEach(opt => {
                html += `<label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label>`;
            });
            container.innerHTML += html + `</div>`;
        });
        
        let time = 2400; // ৪০ মিনিট
        let timerInt = setInterval(() => {
            time--;
            let min = Math.floor(time/60);
            let sec = time%60;
            document.getElementById('timerText').innerText = "সময়: " + min + ":" + (sec < 10 ? "0" : "") + sec;
            if(time <= 0) { 
                clearInterval(timerInt); 
                alert("সময় শেষ! আপনার খাতা স্বয়ংক্রিয়ভাবে জমা দেওয়া হচ্ছে।");
                submitExam(); 
            }
        }, 1000);
        
        // ট্যাব পরিবর্তন করলে পরীক্ষা বাতিল এবং ৩০ মিনিটের জন্য লক
        document.addEventListener("visibilitychange", () => {
            if(document.hidden) {
                const lockUntil = Date.now() + LOCK_DURATION_MS;
                localStorage.setItem(LOCK_KEY, String(lockUntil));
                alert("সতর্কবার্তা লঙ্ঘন! ট্যাব পরিবর্তন করার জন্য আপনার পরীক্ষা বাতিল করা হলো। আপনি ৩০ মিনিট পর পুনরায় পরীক্ষায় প্রবেশ করতে পারবেন।");
                window.location.reload();
            }
        });
    }

    function sendToGoogleSheet(name, sClass, score) {
        // আপনার দেওয়া SheetDB লিংক
        const apiURL = "https://sheetdb.io/api/v1/i3hrdewqq819o"; 

        const timestamp = new Date().toLocaleString("bn-BD", { timeZone: "Asia/Kolkata" });
        const data = {
            "data": [
                {
                    "Timestamp": timestamp,
                    "Name": name,
                    "Class": sClass,
                    "Score": score
                }
            ]
        };

        fetch(apiURL, {
            method: "POST",
            headers: {
                "Accept": "application/json",
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        }).then(response => response.json())
        .then(result => {
            console.log("SheetDB Success:", result);
        }).catch((err) => {
            console.error("SheetDB Error: ", err);
        });
    }
